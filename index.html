    /* === 基礎設定 === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      font-family: 'Courier New', monospace;
      overflow-x: hidden;
      background: #0a0e27;
    }

    /* === 賽博龐克背景動畫 === */
    .gradient-bg {
      background: linear-gradient(135deg, #0a0e27 0%, #16213e 25%, #0f3460 50%, #16213e 75%, #0a0e27 100%);
      background-size: 400% 400%;
      animation: cyberpunkShift 20s ease infinite;
      position: relative;
      overflow: hidden;
    }

    .gradient-bg::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        repeating-linear-gradient(
          0deg,
          rgba(0, 255, 255, 0.03),
          rgba(0, 255, 255, 0.03) 1px,
          transparent 1px,
          transparent 2px
        );
      pointer-events: none;
      animation: scanlines 8s linear infinite;
      z-index: 1;
    }

    @keyframes cyberpunkShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes scanlines {
      0% { transform: translateY(0); }
      100% { transform: translateY(10px); }
    }

    /* === 浮動霓虹粒子 === */
    .bubble {
      position: absolute;
      border-radius: 50%;
      opacity: 0.4;
      animation: floatBubble 8s ease-in-out infinite;
      box-shadow: 0 0 20px currentColor, inset 0 0 10px rgba(0, 255, 255, 0.5);
    }

    @keyframes floatBubble {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-30px) rotate(180deg); }
    }

    /* === 主標題動畫 === */
    .hello-text {
      animation: glitchText 0.8s ease-out, flickerGlow 3s ease-in-out infinite;
      animation-delay: 0s, 0.8s;
      text-shadow: 
        0 0 10px #00ffff,
        0 0 20px #00ffff,
        0 0 30px #ff00ff,
        0 0 40px #ff00ff,
        0 0 50px #0088ff;
      letter-spacing: 2px;
    }

    @keyframes glitchText {
      0% { transform: translate(0); opacity: 0; }
      50% { transform: translate(-3px, 3px); }
      100% { transform: translate(0); opacity: 1; }
    }

    @keyframes flickerGlow {
      0%, 100% { text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 30px #ff00ff; }
      50% { text-shadow: 0 0 5px #00ffff, 0 0 10px #ff00ff, 0 0 20px #0088ff; }
    }

    /* === 賽博龐克卡片效果 === */
    .card-hover {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 2px solid #00ffff;
      background: rgba(16, 52, 96, 0.6);
      backdrop-filter: blur(10px);
      box-shadow: 
        0 0 20px rgba(0, 255, 255, 0.3),
        inset 0 0 20px rgba(0, 255, 255, 0.1),
        0 0 40px rgba(255, 0, 255, 0.1);
    }

    .card-hover:hover {
      transform: translateY(-8px);
      border-color: #ff00ff;
      box-shadow: 
        0 0 30px rgba(255, 0, 255, 0.5),
        inset 0 0 30px rgba(0, 255, 255, 0.2),
        0 0 60px rgba(255, 0, 255, 0.3);
    }

    /* === 霓虹按鈕效果 === */
    .lang-btn {
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      border: 2px solid #00ffff;
      background: rgba(0, 255, 255, 0.1);
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff;
    }

    .lang-btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(0, 255, 255, 0.2);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.4s, height 0.4s;
    }

    .lang-btn:hover::before {
      width: 200%;
      height: 200%;
    }

    .lang-btn:hover {
      border-color: #ff00ff;
      box-shadow: 0 0 20px rgba(255, 0, 255, 0.6), inset 0 0 10px rgba(0, 255, 255, 0.2);
      color: #ff00ff;
      text-shadow: 0 0 10px #ff00ff, 0 0 20px #00ffff;
    }

    .lang-btn.active {
      transform: scale(1.1);
      border-color: #ff00ff;
      background: rgba(255, 0, 255, 0.2);
      box-shadow: 0 0 30px rgba(255, 0, 255, 0.7), inset 0 0 15px rgba(255, 0, 255, 0.3);
      color: #ff00ff;
      text-shadow: 0 0 15px #ff00ff, 0 0 25px #00ffff;
    }

    /* === 功能按鈕樣式 === */
    .feature-btn {
      transition: all 0.3s ease;
      border: 2px solid;
      position: relative;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.3);
      font-family: 'Courier New', monospace;
      font-weight: bold;
    }

    .feature-btn:nth-child(1) {
      border-color: #ff0080;
      color: #ff0080;
      box-shadow: 0 0 15px rgba(255, 0, 128, 0.3), inset 0 0 10px rgba(255, 0, 128, 0.1);
      text-shadow: 0 0 10px #ff0080;
    }

    .feature-btn:nth-child(2) {
      border-color: #00ffff;
      color: #00ffff;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.3), inset 0 0 10px rgba(0, 255, 255, 0.1);
      text-shadow: 0 0 10px #00ffff;
    }

    .feature-btn:nth-child(3) {
      border-color: #ffff00;
      color: #ffff00;
      box-shadow: 0 0 15px rgba(255, 255, 0, 0.3), inset 0 0 10px rgba(255, 255, 0, 0.1);
      text-shadow: 0 0 10px #ffff00;
    }

    .feature-btn:nth-child(4) {
      border-color: #00ff00;
      color: #00ff00;
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.3), inset 0 0 10px rgba(0, 255, 0, 0.1);
      text-shadow: 0 0 10px #00ff00;
    }

    .feature-btn:hover {
      transform: translateY(-3px);
    }

    .feature-btn:active {
      transform: translateY(0);
    }

    /* === 通知提示樣式 === */
    .toast {
      animation: slideIn 0.3s ease-out, fadeOut 0.3s ease-in 2.7s forwards;
      border: 2px solid #00ffff;
      background: rgba(10, 14, 39, 0.95);
      color: #00ffff;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
      text-shadow: 0 0 5px #00ffff;
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes fadeOut {
      to { opacity: 0; transform: translateX(100%); }
    }

    /* === 星星閃爍 === */
    .star {
      animation: cyberpunkTwinkle 1.5s ease-in-out infinite;
      filter: drop-shadow(0 0 5px #00ffff) drop-shadow(0 0 10px #ff00ff);
    }

    @keyframes cyberpunkTwinkle {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.8); }
    }

    /* === 計數器數字動畫 === */
    .counter-num {
      transition: all 0.3s ease;
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff, 0 0 20px #ff00ff;
      font-family: 'Courier New', monospace;
      font-weight: bold;
    }

    .counter-num.bump {
      animation: bump 0.3s ease;
    }

    @keyframes bump {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }

    /* === 統計區背景 === */
    .stats-box {
      border: 2px solid #00ffff;
      background: rgba(0, 255, 255, 0.05);
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.2), inset 0 0 15px rgba(0, 255, 255, 0.1);
    }

    /* === 趣味知識背景 === */
    .fact-box {
      border: 2px solid #00ff00;
      background: rgba(0, 255, 0, 0.05);
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.2), inset 0 0 15px rgba(0, 255, 0, 0.1);
      color: #00ff00;
      text-shadow: 0 0 5px #00ff00;
    }

    /* === 文字基礎樣式 === */
    .neon-text {
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff, 0 0 20px #ff00ff;
    }

    .relative-z {
      position: relative;
      z-index: 10;
    }

      { name: 'terminal', colors: ['#000000', '#0a0e27', '#00ff00', '#00ffff', '#333333'] },
      { name: 'dark-neon', colors: ['#0a0e27', '#16213e', '#2a2a4a', '#ff00ff', '#00ffff'] }
    ];

    // ========== 應用程式狀態 ==========
    let currentLang = 'zh-TW';
    let clickCount = 0;
    let secondsOnPage = 0;
    let currentThemeIndex = 0;

    // ========== 預設配置 ==========
    const defaultConfig = {
      custom_name: '',
      primary_color: '#00ffff',
      secondary_color: '#ff00ff',
      background_color: '#0a0e27',
      text_color: '#00ffff',
      accent_color: '#00ff00',
      font_family: 'Courier New',
      font_size: 16
    };

    // ========== 初始化函式 ==========
    function init() {
      createBubbles();
      renderLanguageButtons();
      updateTime();
      setInterval(updateTime, 1000);
      setInterval(() => {
        secondsOnPage++;
        updateCounter('counter-time', secondsOnPage);
      }, 1000);

      // 追蹤全域點擊
      document.addEventListener('click', () => {
        clickCount++;
        updateCounter('counter-clicks', clickCount);
      });

      // 更新語言數量
      document.getElementById('counter-langs').textContent = Object.keys(languages).length;

      // 初始化 Element SDK
      if (window.elementSdk) {
        window.elementSdk.init({
          defaultConfig,
          onConfigChange: async (config) => {
            const name = config.custom_name || defaultConfig.custom_name;
            if (name) {
              const lang = languages[currentLang];
              document.getElementById('personal-greeting').textContent = 
                `${lang.greeting}，${name}！`;
            }
          },
          mapToCapabilities: (config) => ({
            recolorables: [
              {
                get: () => config.primary_color || defaultConfig.primary_color,
                set: (value) => {
                  config.primary_color = value;
                  window.elementSdk.setConfig({ primary_color: value });
                }
              },
              {
                get: () => config.secondary_color || defaultConfig.secondary_color,
                set: (value) => {
                  config.secondary_color = value;
                  window.elementSdk.setConfig({ secondary_color: value });
                }
              },
              {
                get: () => config.background_color || defaultConfig.background_color,
                set: (value) => {
                  config.background_color = value;
                  window.elementSdk.setConfig({ background_color: value });
                }
              }
            ],
            borderables: [],
            fontEditable: {
              get: () => config.font_family || defaultConfig.font_family,
              set: (value) => {
                config.font_family = value;
                window.elementSdk.setConfig({ font_family: value });
              }
            },
            fontSizeable: {
              get: () => config.font_size || defaultConfig.font_size,
              set: (value) => {
                config.font_size = value;
                window.elementSdk.setConfig({ font_size: value });
              }
            }
          }),
          mapToEditPanelValues: (config) => new Map([
            ['custom_name', config.custom_name || defaultConfig.custom_name]
          ])
        });
      }
    }

    // ========== 建立浮動粒子 ==========
    function createBubbles() {
      const container = document.getElementById('bubbles-container');
      const colors = ['#00ffff', '#ff00ff', '#00ff00', '#ffff00', '#0088ff'];
      
      for (let i = 0; i < 15; i++) {
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        const size = Math.random() * 60 + 20;
        bubble.style.cssText = `
          width: ${size}px;
          height: ${size}px;
          left: ${Math.random() * 100}%;
          top: ${Math.random() * 100}%;
          color: ${colors[Math.floor(Math.random() * colors.length)]};
          animation-delay: ${Math.random() * 5}s;
          animation-duration: ${Math.random() * 5 + 5}s;
        `;
        container.appendChild(bubble);
      }
    }

    // ========== 渲染語言按鈕 ==========
    function renderLanguageButtons() {
      const container = document.getElementById('lang-buttons');
      container.innerHTML = '';
      
      Object.entries(languages).forEach(([code, lang]) => {
        const btn = document.createElement('button');
        btn.className = `lang-btn px-3 py-2 rounded-xl text-sm font-semibold transition-all ${
          code === currentLang 
            ? 'active' 
            : ''
        }`;
        btn.innerHTML = `${lang.flag} ${lang.name}`;
        btn.onclick = () => changeLanguage(code);
        container.appendChild(btn);
      });
    }

    // ========== 切換語言 ==========
    function changeLanguage(langCode) {
      currentLang = langCode;
      const lang = languages[langCode];
      
      // 更新介面文字
      document.getElementById('hello-title').textContent = lang.hello;
      document.getElementById('personal-greeting').textContent = lang.greeting;
      document.getElementById('select-lang-text').textContent = lang.selectLang;
      document.getElementById('btn-speak').textContent = lang.speak;
      document.getElementById('btn-copy').textContent = lang.copy;
      document.getElementById('btn-theme').textContent = lang.theme;
      document.getElementById('btn-fact').textContent = lang.fact;
      document.getElementById('stat-langs').textContent = lang.langs;
      document.getElementById('stat-clicks').textContent = lang.clicks;
      document.getElementById('stat-time').textContent = lang.time;
      document.getElementById('footer-text').textContent = lang.footer;
      document.getElementById('version-text').textContent = lang.version;
      
      // 更新語言按鈕狀態
      renderLanguageButtons();
      
      // 隱藏趣味知識
      document.getElementById('fact-display').classList.add('hidden');
    }

    // ========== 語音播放 ==========
    function speakHello() {
      if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(languages[currentLang].hello);
        
        // 設定語言
        const langMap = {
          'zh-TW': 'zh-TW', 'zh-CN': 'zh-CN', 'en': 'en-US', 'ja': 'ja-JP',
          'ko': 'ko-KR', 'es': 'es-ES', 'fr': 'fr-FR', 'de': 'de-DE',
          'pt': 'pt-BR', 'it': 'it-IT', 'ru': 'ru-RU', 'ar': 'ar-SA'
        };
        utterance.lang = langMap[currentLang] || 'en-US';
        utterance.rate = 0.9;
        speechSynthesis.speak(utterance);
        
        showToast('🔊', languages[currentLang].hello);
      }
    }

    // ========== 複製到剪貼簿 ==========
    async function copyToClipboard() {
      const text = languages[currentLang].hello;
      try {
        await navigator.clipboard.writeText(text);
        showToast('📋', languages[currentLang].copied);
      } catch (err) {
        // 備用方法
        const textArea = document.createElement('textarea');
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
        showToast('📋', languages[currentLang].copied);
      }
    }

    // ========== 更換主題 ==========
    function changeTheme() {
      currentThemeIndex = (currentThemeIndex + 1) % themes.length;
      const theme = themes[currentThemeIndex];
      
      document.body.style.background = `linear-gradient(135deg, ${theme.colors.join(', ')})`;
      document.body.style.backgroundSize = '400% 400%';
      
      showToast('🎨', languages[currentLang].themeChanged);
    }

    // ========== 顯示趣味知識 ==========
    function showRandomFact() {
      const facts = funFacts[currentLang] || funFacts['en'];
      const randomFact = facts[Math.floor(Math.random() * facts.length)];
      
      const factDisplay = document.getElementById('fact-display');
      const factText = document.getElementById('fact-text');
      
      factText.textContent = randomFact;
      factDisplay.classList.remove('hidden');
      
      // 5 秒後自動隱藏
      setTimeout(() => {
        factDisplay.classList.add('hidden');
      }, 5000);
    }

    // ========== 更新時間顯示 ==========
    function updateTime() {
      const now = new Date();
      const options = { 
        year: 'numeric', month: 'long', day: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      };
      document.getElementById('current-time').textContent = now.toLocaleDateString(currentLang, options);
    }

    // ========== 更新計數器 ==========
    function updateCounter(id, value) {
      const el = document.getElementById(id);
      el.textContent = value;
      el.classList.add('bump');
      setTimeout(() => el.classList.remove('bump'), 300);
    }

    // ========== 顯示通知 ==========
    function showToast(icon, message) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast rounded-xl px-4 py-3 flex items-center gap-2';
      toast.innerHTML = `<span class="text-xl">${icon}</span><span class="text-sm font-medium">${message}</span>`;
      container.appendChild(toast);
      
      setTimeout(() => toast.remove(), 3000);
    }

    // ========== 啟動應用程式 ==========
    init();
  </script>

      box-shadow: 0 0 15px rgba(0, 255, 255, 0.3), inset 0 0 10px rgba(0, 255, 255, 0.1);

    // ========== 趣味知識資料庫 ==========
    const funFacts = {
      'zh-TW': [
        '"Hello World" 最早出現在 1972 年的 C 語言教科書中！',
        '全世界有超過 7000 種語言，但只有約 23 種語言涵蓋了全球一半人口的母語！',

        '世界上最多人使用的程式語言是 JavaScript！',
        '一個擁抱可以讓你的心情好上 20%！'
      ],
      'en': [
        '"Hello World" first appeared in a C programming textbook in 1972!',
        'There are over 7000 languages in the world!',
        'The first computer program was written by Ada Lovelace in 1843!',
        'JavaScript is the most widely used programming language!',
        'A hug can improve your mood by 20%!'
      ]
    };

    // ========== 主題配色 ==========
    const themes = [
      { name: 'sunset', colors: ['#ffecd2', '#fcb69f', '#a8edea', '#fed6e3', '#d299c2'] },
      { name: 'ocean', colors: ['#667eea', '#764ba2', '#66a6ff', '#89f7fe', '#c0c0aa'] },
      { name: 'forest', colors: ['#134e5e', '#71b280', '#aa4b6b', '#6b6b83', '#3b8d99'] },
      { name: 'candy', colors: ['#ff9a9e', '#fecfef', '#fecfef', '#a18cd1', '#fbc2eb'] },
      { name: 'midnight', colors: ['#0f0c29', '#302b63', '#24243e', '#4a4e69', '#22223b'] }
    ];

    // ========== 應用程式狀態 ==========
    let currentLang = 'zh-TW';
    let clickCount = 0;
    let secondsOnPage = 0;
    let currentThemeIndex = 0;

    // ========== 預設配置 ==========
    const defaultConfig = {
      custom_name: '',
      primary_color: '#ff6b6b',
      secondary_color: '#4ecdc4',
      background_color: '#ffecd2',
      text_color: '#333333',
      accent_color: '#a8edea',
      font_family: 'Nunito',
      font_size: 16
    };

    // ========== 初始化函式 ==========
    function init() {
      createBubbles();
      renderLanguageButtons();
      updateTime();
      setInterval(updateTime, 1000);
      setInterval(() => {
        secondsOnPage++;
        updateCounter('counter-time', secondsOnPage);
      }, 1000);

      // 追蹤全域點擊
      document.addEventListener('click', () => {
        clickCount++;
        updateCounter('counter-clicks', clickCount);
      });

      // 更新語言數量
      document.getElementById('counter-langs').textContent = Object.keys(languages).length;

      // 初始化 Element SDK
      if (window.elementSdk) {
        window.elementSdk.init({
          defaultConfig,
          onConfigChange: async (config) => {
            const name = config.custom_name || defaultConfig.custom_name;
            if (name) {
              const lang = languages[currentLang];
              document.getElementById('personal-greeting').textContent = 
                `${lang.greeting}，${name}！`;
            }
          },
          mapToCapabilities: (config) => ({
            recolorables: [
              {
                get: () => config.background_color || defaultConfig.background_color,
                set: (value) => {
                  config.background_color = value;
                  window.elementSdk.setConfig({ background_color: value });
                }
              },
              {
                get: () => config.primary_color || defaultConfig.primary_color,
                set: (value) => {
                  config.primary_color = value;
                  window.elementSdk.setConfig({ primary_color: value });
                }
              },
              {
                get: () => config.text_color || defaultConfig.text_color,
                set: (value) => {
                  config.text_color = value;
                  window.elementSdk.setConfig({ text_color: value });
                }
              }
            ],
            borderables: [],
            fontEditable: {
              get: () => config.font_family || defaultConfig.font_family,
              set: (value) => {
                config.font_family = value;
                window.elementSdk.setConfig({ font_family: value });
              }
            },
            fontSizeable: {
              get: () => config.font_size || defaultConfig.font_size,
              set: (value) => {
                config.font_size = value;
                window.elementSdk.setConfig({ font_size: value });
              }
            }
          }),
          mapToEditPanelValues: (config) => new Map([
            ['custom_name', config.custom_name || defaultConfig.custom_name]
          ])
        });
      }
    }

    // ========== 建立浮動泡泡 ==========
    function createBubbles() {
      const container = document.getElementById('bubbles-container');
      const colors = ['#ff9a9e', '#a8edea', '#ffecd2', '#d299c2', '#667eea'];
      
      for (let i = 0; i < 15; i++) {
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        const size = Math.random() * 60 + 20;
        bubble.style.cssText = `
          width: ${size}px;
          height: ${size}px;
          left: ${Math.random() * 100}%;
          top: ${Math.random() * 100}%;
          background: ${colors[Math.floor(Math.random() * colors.length)]};
          animation-delay: ${Math.random() * 5}s;
          animation-duration: ${Math.random() * 5 + 5}s;
        `;
        container.appendChild(bubble);
      }
    }

    // ========== 渲染語言按鈕 ==========
    function renderLanguageButtons() {
      const container = document.getElementById('lang-buttons');
      container.innerHTML = '';
      
      Object.entries(languages).forEach(([code, lang]) => {
        const btn = document.createElement('button');
        btn.className = `lang-btn px-3 py-2 rounded-xl text-sm font-semibold transition-all ${
          code === currentLang 
            ? 'active bg-gradient-to-r from-rose-400 to-pink-400 text-white shadow-lg' 
            : 'bg-white/60 hover:bg-white text-gray-700 shadow'
        }`;
        btn.innerHTML = `${lang.flag} ${lang.name}`;
        btn.onclick = () => changeLanguage(code);
        container.appendChild(btn);
      });
    }

    // ========== 切換語言 ==========
    function changeLanguage(langCode) {
      currentLang = langCode;
      const lang = languages[langCode];
      
      // 更新介面文字
      document.getElementById('hello-title').textContent = lang.hello;
      document.getElementById('personal-greeting').textContent = lang.greeting;
      document.getElementById('select-lang-text').textContent = lang.selectLang;
      document.getElementById('btn-speak').textContent = lang.speak;
      document.getElementById('btn-copy').textContent = lang.copy;
      document.getElementById('btn-theme').textContent = lang.theme;
      document.getElementById('btn-fact').textContent = lang.fact;
      document.getElementById('stat-langs').textContent = lang.langs;
      document.getElementById('stat-clicks').textContent = lang.clicks;
      document.getElementById('stat-time').textContent = lang.time;
      document.getElementById('footer-text').textContent = lang.footer;
      document.getElementById('version-text').textContent = lang.version;
      
      // 更新語言按鈕狀態
      renderLanguageButtons();
      
      // 隱藏趣味知識
      document.getElementById('fact-display').classList.add('hidden');
    }

    // ========== 語音播放 ==========
    function speakHello() {
      if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(languages[currentLang].hello);
        
        // 設定語言
        const langMap = {
          'zh-TW': 'zh-TW', 'zh-CN': 'zh-CN', 'en': 'en-US', 'ja': 'ja-JP',
          'ko': 'ko-KR', 'es': 'es-ES', 'fr': 'fr-FR', 'de': 'de-DE',
          'pt': 'pt-BR', 'it': 'it-IT', 'ru': 'ru-RU', 'ar': 'ar-SA'
        };
        utterance.lang = langMap[currentLang] || 'en-US';
        utterance.rate = 0.9;
        speechSynthesis.speak(utterance);
        
        showToast('🔊', languages[currentLang].hello);
      }
    }

    // ========== 複製到剪貼簿 ==========
    async function copyToClipboard() {
      const text = languages[currentLang].hello;
      try {
        await navigator.clipboard.writeText(text);
        showToast('✅', languages[currentLang].copied);
      } catch (err) {
        // 備用方法
        const textArea = document.createElement('textarea');
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
        showToast('✅', languages[currentLang].copied);
      }
    }

    // ========== 更換主題 ==========
    function changeTheme() {
      currentThemeIndex = (currentThemeIndex + 1) % themes.length;
      const theme = themes[currentThemeIndex];
      
      document.body.style.background = `linear-gradient(-45deg, ${theme.colors.join(', ')})`;
      document.body.style.backgroundSize = '400% 400%';
      
      showToast('🎨', languages[currentLang].themeChanged);
    }

    // ========== 顯示趣味知識 ==========
    function showRandomFact() {
      const facts = funFacts[currentLang] || funFacts['en'];
      const randomFact = facts[Math.floor(Math.random() * facts.length)];
      
      const factDisplay = document.getElementById('fact-display');
      const factText = document.getElementById('fact-text');
      
      factText.textContent = `💡 ${randomFact}`;
      factDisplay.classList.remove('hidden');
      
      // 3 秒後自動隱藏
      setTimeout(() => {
        factDisplay.classList.add('hidden');
      }, 5000);
    }

    // ========== 更新時間顯示 ==========
    function updateTime() {
      const now = new Date();
      const options = { 
        year: 'numeric', month: 'long', day: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      };
      document.getElementById('current-time').textContent = now.toLocaleDateString(currentLang, options);
    }

    // ========== 更新計數器 ==========
    function updateCounter(id, value) {
      const el = document.getElementById(id);
      el.textContent = value;
      el.classList.add('bump');
      setTimeout(() => el.classList.remove('bump'), 300);
    }

    // ========== 顯示通知 ==========
    function showToast(icon, message) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast bg-white/95 backdrop-blur rounded-xl shadow-lg px-4 py-3 flex items-center gap-2';
      toast.innerHTML = `<span class="text-xl">${icon}</span><span class="text-gray-700 text-sm font-medium">${message}</span>`;
      container.appendChild(toast);
      
      setTimeout(() => toast.remove(), 3000);
    }

    // ========== 啟動應用程式 ==========
    init();
  </script>
